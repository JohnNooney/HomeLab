image:
  repository: ghcr.io/home-operations/prowlarr
  tag:
  pullPolicy: IfNotPresent

env:
  TZ: Europe/London

service:
  main:
    ports:
      http:
        port: 9696

ingress:
  main:
    enabled: true
    hosts:
      - host: prowlarr.nooney.dev
        paths:
          - path: /
            pathType: Prefix

probes:
  liveness:
    enabled: true
    custom: true
    spec:
      exec:
        command:
        - /usr/bin/env
        - bash
        - -c
        - curl --fail localhost:9696/api/v1/system/status?apiKey=`IFS=\> && while
          read -d \< E C; do if [[ $E = "ApiKey" ]]; then echo $C; fi; done < /config/config.xml`
      failureThreshold: 5
      initialDelaySeconds: 60
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10

persistence:
  config:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
