image:
  repository: ghcr.io/home-operations/lidarr
  tag:
  pullPolicy: IfNotPresent

env:
  TZ: Europe/London

service:
  main:
    ports:
      http:
        port: 8686

ingress:
  main:
    enabled: true
    hosts:
      - host: lidarr.nooney.dev
        paths:
          - path: /
            pathType: Prefix

probes:
  liveness:
    enabled: true
    custom: true
    spec:
      exec:
        command:
        - /usr/bin/env
        - bash
        - -c
        - curl --fail localhost:8686/api/v1/system/status?apiKey=`IFS=\> && while
          read -d \< E C; do if [[ $E = "ApiKey" ]]; then echo $C; fi; done < /config/config.xml`
      failureThreshold: 5
      initialDelaySeconds: 60
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10

persistence:
  config:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
  media:
    enabled: true
    mountPath: /media
    type: hostPath
    hostPath: /mnt/media/music
  downloads:
    enabled: true
    mountPath: /downloads
    type: hostPath
    hostPath: /mnt/downloads

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

metrics:
  enabled: false
  serviceMonitor:
    interval: 3m
    scrapeTimeout: 1m
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}
    rules: []
  exporter:
    image:
      repository: ghcr.io/onedr0p/exportarr
      tag: v2.3.0
      pullPolicy: IfNotPresent
    env:
      port: 9792
      additionalMetrics: false
      unknownQueueItems: false
