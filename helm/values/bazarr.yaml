image:
  repository: ghcr.io/home-operations/bazarr
  tag:
  pullPolicy: IfNotPresent

env:
  TZ: Europe/London

service:
  main:
    ports:
      http:
        port: 6767

ingress:
  main:
    enabled: true
    hosts:
      - host: bazarr.nooney.dev
        paths:
          - path: /
            pathType: Prefix

persistence:
  config:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
  media:
    enabled: true
    mountPath: /media
    type: hostPath
    hostPath: /mnt/media

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
