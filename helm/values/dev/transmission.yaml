image:
  repository: linuxserver/transmission
  tag: latest
  pullPolicy: IfNotPresent

env:
  TZ: "Europe/London"
  PUID: "1000"
  PGID: "1000"

service:
  web:
    type: NodePort
    port: 9091
    annotations: {}
    # Actual NodePort assigned: 31364 (auto-assigned by Kubernetes)
  torrent:
    enabled: true
    type: NodePort
    tcpPort: 51413
    udpPort: 51413
    annotations: {}
    # Actual NodePort assigned: 31560 (auto-assigned by Kubernetes)

initContainers:
  - name: create-dirs
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        mkdir -p /downloads/complete /downloads/incomplete
        chown -R 1000:1000 /downloads
    volumeMounts:
      - name: downloads
        mountPath: /downloads

ingress:
  main:
    enabled: true
    hosts:
      - host: transmission.nooney.dev
        paths:
          - path: /
            pathType: Prefix

persistence:
  config:
    enabled: true
    storageClassName: "local-path"
    accessMode: ReadWriteOnce
    size: 1Gi
    existingClaim: ""
  downloads:
    enabled: true
    type: pvc
    storageClassName: "local-path"
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""
    # Note: For production, use NFS with ReadWriteMany to share downloads with other media apps
    # nfsServer: "192.168.100.21" (or whatever the nfs server will be - likely the RPi)
    # nfsPath: "/mnt/downloads"

extraVolumes:
  - name: watch
    emptyDir: {}

extraVolumeMounts:
  - name: watch
    mountPath: /watch

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
