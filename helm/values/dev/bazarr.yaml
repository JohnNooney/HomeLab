image:
  repository: ghcr.io/home-operations/bazarr
  tag:
  pullPolicy: IfNotPresent

env:
  TZ: Europe/London

service:
  main:
    type: NodePort
    ports:
      http:
        port: 6767
        nodePort: 30676

ingress:
  main:
    enabled: true
    hosts:
      - host: bazarr.nooney.dev
        paths:
          - path: /
            pathType: Prefix

persistence:
  config:
    enabled: true
    size: 1Gi
    accessMode: ReadWriteOnce
  media:
    enabled: true
    mountPath: /media
    type: hostPath
    hostPath: /mnt/media

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
