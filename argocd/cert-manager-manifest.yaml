project: default
source:
  repoURL: https://charts.jetstack.io
  targetRevision: v1.20.2
  helm:
    parameters:
      - name: crds.enabled
        value: 'true'
  chart: cert-manager
destination:
  server: https://kubernetes.default.svc
  namespace: cert-manager
syncPolicy:
  syncOptions:
    - ServerSideApply=true
    - CreateNamespace=true
