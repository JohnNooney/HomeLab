---
- name: Configure Networking for Kubernetes
  hosts: k8s_cluster
  become: yes
  tasks:
    - name: Load kernel modules for Kubernetes
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Configure sysctl parameters for Kubernetes
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'net.ipv4.ip_forward', value: '1' }

    - name: Disable IPv6 (optional)
      sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        sysctl_file: /etc/sysctl.d/99-disable-ipv6.conf
        reload: yes
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
        - net.ipv6.conf.lo.disable_ipv6
      when: disable_ipv6 | default(false)

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Verify kernel modules are loaded
      shell: lsmod | grep -E 'overlay|br_netfilter'
      register: modules_check
      changed_when: false
      failed_when: modules_check.rc not in [0, 1]

    - name: Display loaded modules
      debug:
        var: modules_check.stdout_lines
