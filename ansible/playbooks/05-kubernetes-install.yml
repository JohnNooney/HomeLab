---
- name: Install Kubernetes Components
  hosts: k8s_cluster
  become: yes
  vars:
    kubernetes_version: "1.28"
  tasks:
    - name: Add Kubernetes apt signing key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: present

    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
        state: present
        filename: kubernetes

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: yes

    - name: Verify kubeadm installation
      command: kubeadm version -o short
      register: kubeadm_version
      changed_when: false

    - name: Verify kubectl installation
      command: kubectl version --client --output=yaml
      register: kubectl_version
      changed_when: false
      ignore_errors: yes

    - name: Display Kubernetes versions
      debug:
        msg:
          - "kubeadm: {{ kubeadm_version.stdout }}"
          - "kubectl: {{ kubectl_version.stdout_lines[0] | default('N/A') }}"
