---
all:
  children:
    control_plane:
      hosts:
        k8s-control-01:
          ansible_host: 172.25.37.31
    workers:
      hosts:
        k8s-worker-01:
          ansible_host: 172.25.37.32
        k8s-worker-02:
          ansible_host: 172.25.40.33
        k8s-worker-03:
          ansible_host: 172.25.40.34
    k8s_cluster:
      children:
        control_plane: {}
        workers: {}
  vars:
    ansible_user: ubuntu
    ansible_become: yes
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
